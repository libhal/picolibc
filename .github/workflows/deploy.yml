name: 🚀 Deploy

on:
  workflow_dispatch:
  pull_request:
  release:
    types:
      - published
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_11_3:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "11.3"
    secrets: inherit

  deploy_12_2:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "12.2"
    secrets: inherit

  deploy_12_3:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "12.3"
    secrets: inherit

  deploy_12:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "12"
    secrets: inherit

  deploy_13_2:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "13.2"
    secrets: inherit

  deploy_13_3:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "13.3"
    secrets: inherit

  deploy_13:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "13"
    secrets: inherit

  deploy_14_2:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "14.2"
    secrets: inherit

  deploy_14:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "14"
    secrets: inherit

  deploy_15:
    uses: ./.github/workflows/package_and_upload.yml
    with:
      version: "15"
    secrets: inherit
